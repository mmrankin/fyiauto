# Cloudflare Tunnel config for fyiAuto.com -> local waitress (port 5055).
#
# The tunnel dials OUT to Cloudflare, so the origin host needs no public IP and
# no inbound firewall rule. Cloudflare handles DNS, TLS and CDN caching.
#
# One-time setup (run on the host that serves fyiAuto):
#   1. brew install cloudflared            # macOS  (Linux: see DEPLOY.md)
#   2. cloudflared tunnel login            # opens browser; pick the fyiAuto.com zone
#   3. cloudflared tunnel create fyiauto   # prints a Tunnel UUID + creds json path
#   4. Put the UUID + creds path below.
#   5. cloudflared tunnel route dns fyiauto fyiAuto.com
#      cloudflared tunnel route dns fyiauto www.fyiAuto.com
#   6. Test:  cloudflared tunnel --config <this file> run
#      Then run it as a service (see DEPLOY.md / com.fyiauto.tunnel.plist).

tunnel: 6475a806-b4f3-42ec-8e4a-927b7a98a586
credentials-file: /Users/markrankin/.cloudflared/6475a806-b4f3-42ec-8e4a-927b7a98a586.json

# Be tolerant of the cold-start facet queries on novel filter combos.
originRequest:
  connectTimeout: 30s
  noTLSVerify: true

ingress:
  - hostname: fyiAuto.com
    service: http://localhost:5055
  - hostname: www.fyiAuto.com
    service: http://localhost:5055
  # ── dlrpro.com — dealer lead platform ──
  - hostname: dlrpro.com          # Platform Admin
    service: http://localhost:5050
  - hostname: lead.dlrpro.com     # Lead Form
    service: http://localhost:5002
  - hostname: trade.dlrpro.com    # Trade-In widget
    service: http://localhost:5001
  - hostname: credit.dlrpro.com   # Credit Estimator
    service: http://localhost:5003
  # ── PanaSight analytics (serve.py) ──
  - hostname: panasight.dlrpro.com # PanaSight dashboards + live APIs
    service: http://localhost:8799
  # Everything else returns 404 instead of reaching the app.
  - service: http_status:404
